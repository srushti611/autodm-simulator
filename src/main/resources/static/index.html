<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-DM Smart Campaign Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <div class="max-w-6xl mx-auto p-6">
        <!-- Header -->
        <header class="flex justify-between items-center border-b border-slate-800 pb-6 mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500">AutoDM Automation Hub</h1>
                <p class="text-slate-400 mt-1">Manage interactive Instagram keyword triggers and campaigns</p>
            </div>
            <button onclick="toggleModal(true)" class="bg-gradient-to-r from-pink-500 to-violet-500 hover:from-pink-600 hover:to-violet-600 px-5 py-2.5 rounded-xl font-semibold shadow-lg shadow-pink-500/20 transition-all cursor-pointer">
                + New Trigger
            </button>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-slate-800/50 border border-slate-700/50 p-6 rounded-2xl">
                <p class="text-slate-400 font-medium text-sm uppercase tracking-wider">Total Triggers</p>
                <p id="total-triggers" class="text-4xl font-bold mt-2">0</p>
            </div>
            <div class="bg-slate-800/50 border border-slate-700/50 p-6 rounded-2xl">
                <p class="text-slate-400 font-medium text-sm uppercase tracking-wider">Total Auto-DMs Sent</p>
                <p id="total-dms" class="text-4xl font-bold mt-2 text-pink-400">0</p>
            </div>
            <div class="bg-slate-800/50 border border-slate-700/50 p-6 rounded-2xl">
                <p class="text-slate-400 font-medium text-sm uppercase tracking-wider">System Status</p>
                <p class="text-4xl font-bold mt-2 text-emerald-400 flex items-center gap-2">
                    <span class="h-3 w-3 rounded-full bg-emerald-400 animate-pulse"></span> Active
                </p>
            </div>
        </div>

        <!-- Main Dashboard Table -->
        <div class="bg-slate-800/40 border border-slate-800 rounded-2xl overflow-hidden backdrop-blur-md">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800/80 text-slate-300 uppercase text-xs font-semibold tracking-wider border-b border-slate-700/50">
                        <th class="p-4">Trigger Keyword</th>
                        <th class="p-4">Automated DM Content Response</th>
                        <th class="p-4 text-center">DMs Sent</th>
                        <th class="p-4 text-center">Status</th>
                        <th class="p-4 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="campaign-rows" class="divide-y divide-slate-800/60">
                    <!-- Dynamic Rows Insertion -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Trigger Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-md rounded-2xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-violet-400">Configure Automation Trigger</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Keyword (e.g., GROW)</label>
                    <input id="input-keyword" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-100 focus:outline-none focus:border-pink-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Auto-Response Message</label>
                    <textarea id="input-message" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-100 focus:outline-none focus:border-pink-500"></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="toggleModal(false)" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl font-medium cursor-pointer">Cancel</button>
                <button onclick="saveCampaign()" class="px-4 py-2 bg-gradient-to-r from-pink-500 to-violet-500 hover:from-pink-600 hover:to-violet-600 rounded-xl font-semibold shadow-md cursor-pointer">Deploy Trigger</button>
            </div>
        </div>
    </div>

    <!-- Frontend JS Logic -->
    <script>
        const API_URL = '/api/campaigns';

        function toggleModal(show) {
            document.getElementById('modal').classList.toggle('hidden', !show);
        }

        async function fetchCampaigns() {
            const res = await fetch(API_URL);
            const campaigns = await res.json();
            
            const tbody = document.getElementById('campaign-rows');
            tbody.innerHTML = '';
            
            let totalDms = 0;
            campaigns.forEach(c => {
                totalDms += c.triggerCount;
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-800/20 transition-colors">
                        <td class="p-4 font-mono font-bold text-pink-400 text-sm">comment "${c.triggerKeyword}"</td>
                        <td class="p-4 text-slate-300 max-w-xs truncate">${c.dmMessage}</td>
                        <td class="p-4 text-center font-semibold text-slate-200">${c.triggerCount}</td>
                        <td class="p-4 text-center">
                            <span class="px-2.5 py-1 text-xs font-bold rounded-full ${c.active ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-slate-700/30 text-slate-400 border border-slate-700/50'}">
                                ${c.active ? 'Live' : 'Paused'}
                            </span>
                        </td>
                        <td class="p-4">
                            <div class="flex items-center justify-center gap-2">
                                <button onclick="simulateTrigger(${c.id})" class="px-3 py-1.5 text-xs font-medium bg-slate-700 hover:bg-pink-600 hover:text-white rounded-lg transition-all cursor-pointer">⚡ Simulate DM</button>
                                <button onclick="toggleStatus(${c.id})" class="px-3 py-1.5 text-xs font-medium bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-400 cursor-pointer">🔄 Toggle</button>
                            </div>
                        </td>
                    </tr>`;
            });

            document.getElementById('total-triggers').innerText = campaigns.length;
            document.getElementById('total-dms').innerText = totalDms;
        }

        async function saveCampaign() {
            const triggerKeyword = document.getElementById('input-keyword').value;
            const dmMessage = document.getElementById('input-message').value;

            if(!triggerKeyword || !dmMessage) return alert('Please fill in all fields');

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ triggerKeyword, dmMessage, active: true })
            });

            toggleModal(false);
            document.getElementById('input-keyword').value = '';
            document.getElementById('input-message').value = '';
            fetchCampaigns();
        }

        async function simulateTrigger(id) {
            await fetch(`${API_URL}/${id}/trigger`, { method: 'POST' });
            fetchCampaigns();
        }

        async function toggleStatus(id) {
            await fetch(`${API_URL}/${id}/toggle`, { method: 'PUT' });
            fetchCampaigns();
        }

        window.onload = fetchCampaigns;
    </script>
</body>
</html>
